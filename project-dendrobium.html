<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浙江温州·铁皮石斛视觉设计 - 刘相池作品集</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .project-detail {
            padding: 100px 0 80px;
            background: #0a0a0a;
            min-height: 100vh;
        }

        .project-header {
            max-width: 1200px;
            margin: 0 auto 3rem;
            padding: 0 20px;
        }

        .back-link {
            display: inline-block;
            color: #f6ca4b;
            text-decoration: none;
            margin-bottom: 2rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #ffffff;
            transform: translateX(-5px);
        }

        .project-title {
            font-size: 2.5rem;
            color: #f6ca4b;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .project-meta {
            color: #b0b0b0;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .project-meta strong {
            color: #f6ca4b;
        }

        .project-description {
            max-width: 1200px;
            margin: 0 auto 3rem;
            padding: 0 20px;
            color: #e0e0e0;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .project-section {
            max-width: 1200px;
            margin: 0 auto 3rem;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.8rem;
            color: #f6ca4b;
            margin-bottom: 2rem;
            font-weight: 700;
        }

        .exhibition-board {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .exhibition-board img {
            width: 100%;
            height: auto;
            display: block;
        }

        .poster-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .poster-item {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .poster-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(246, 202, 75, 0.3);
        }

        .poster-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 768px) {
            .project-title {
                font-size: 2rem;
            }

            .poster-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">ELLA</div>
            <ul class="nav-links">
                <li><a href="index.html#home">首页</a></li>
                <li><a href="index.html#about">关于我</a></li>
                <li><a href="index.html#skills">专业技能</a></li>
                <li><a href="index.html#portfolio">作品集</a></li>
                <li><a href="index.html#contact">联系方式</a></li>
            </ul>
        </div>
    </nav>

    <!-- 作品详情 -->
    <section class="project-detail">
        <div class="project-header">
            <a href="index.html#portfolio" class="back-link">← 返回作品集</a>
            <h1 class="project-title">浙江温州·铁皮石斛视觉设计</h1>
            <p class="project-meta"><strong>使用软件：</strong>Procreate / Adobe Illustrator</p>
            <p class="project-meta"><strong>项目类型：</strong>品牌视觉设计 / 海报设计</p>
        </div>

        <div class="project-description">
            <p>以浙江温州雁荡山铁皮石斛为主题，结合传统国画美学，打造了一套包含主题插画、系列海报及文创衍生的完整视觉设计，通过自然清新的国风语言，传递铁皮石斛的地域文化价值与"仙草"特质。</p>
        </div>

        <!-- 展板展示 -->
        <div class="project-section">
            <h2 class="section-title">展板展示</h2>
            <div class="exhibition-board">
                <img src="images/展板.jpg" alt="铁皮石斛展板">
            </div>
        </div>

        <!-- 系列海报展示 -->
        <div class="project-section">
            <h2 class="section-title">系列海报展示</h2>
            <div class="poster-grid">
                <div class="poster-item">
                    <img src="images/铁皮石斛.jpg" alt="铁皮石斛海报1">
                </div>
                <div class="poster-item">
                    <img src="images/铁皮石斛2.jpg" alt="铁皮石斛海报2">
                </div>
                <div class="poster-item">
                    <img src="images/铁皮石斛3.jpg" alt="铁皮石斛海报3">
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 刘相池. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
